moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - joint_trajectory_controller

  joint_trajectory_controller:
    type: JointGroupPositionController # Cambiado para que sea compatible con el nodo que tienes
    action_ns: joint_command           # Este es el tópico que creamos en Isaac
    default: True
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
